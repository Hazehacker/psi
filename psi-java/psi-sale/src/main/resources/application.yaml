server:
  port: ${sp.sale}
spring:
  application:
    name: ${sn.sale}
seata:
  tx-service-group: tx-business
  enabled: true
  service:
    #seata服务地址
    grouplist:
      default: ${seata.default}
    #虚拟组和分组映射，key的名字与tx-service-group一致
    vgroup-mapping:
      tx-business: default
    #开启全局事务
    disable-global-transaction: false
mybatis-plus:
  global-config:
    db-config:
      table-underline: false
      capital-mode: false
  configuration:
    map-underscore-to-camel-case: true